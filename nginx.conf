# Nginx configuration for Spirit Hub Cafe SSR/SPA

server {
    listen 80;
    server_name spirithubcafe.com www.spirithubcafe.com;
    # Redirect HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name spirithubcafe.com www.spirithubcafe.com;
    root /var/www/spirithubcafe/dist;
    index index.html;

    # SSL certificates (managed by Certbot or similar)
    # ssl_certificate     /etc/letsencrypt/live/spirithubcafe.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/spirithubcafe.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Security headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── SEO / crawl files ─────────────────────────────────────────────
    location ~ ^/(sitemap\.xml|products-feed\.xml)$ {
        try_files $uri =404;
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        add_header Content-Type "application/xml; charset=utf-8";
    }

    location = /robots.txt {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain; charset=utf-8";
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/manifest+json; charset=utf-8";
    }

    # ── Service Worker — must never be cached ────────────────────────
    location ~* (sw\.js|service-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Fingerprinted static assets — cache 1 year ───────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Redirect www -> non-www ──────────────────────────────────────
    if ($host = "www.spirithubcafe.com") {
        return 301 https://spirithubcafe.com$request_uri;
    }

    # ── SPA / SSR fallback ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── 404 → SPA shell (React Router handles display) ───────────────
    error_page 404 /index.html;
}
