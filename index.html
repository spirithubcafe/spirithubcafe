    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://api.spirithubcafe.com" />
    <link rel="dns-prefetch" href="https://api.spirithubcafe.com" />

    <!-- Preconnect to Google Analytics so the gtag.js script loads faster -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    
    <!-- Preload likely LCP assets -->
    <link rel="preload" as="image" href="/images/slides/premium-specialty-coffee-roasted-in-oman.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/slides/slide1.webp" fetchpriority="high" />

    <!-- Geo Tags for Local SEO -->
    <meta name="geo.region" content="OM" />
    <meta name="geo.placename" content="Muscat" />
    <meta name="geo.position" content="23.5880;58.3829" />
    <meta name="ICBM" content="23.5880, 58.3829" />

    <!-- Google Analytics 4 (GA4) -->
    <!-- gtag.js is injected dynamically by ga4.ts only when                  -->
    <!-- VITE_GA4_MEASUREMENT_ID is set (zero network impact otherwise).      -->
    <!-- This stub buffers dataLayer pushes that happen before React boots.   -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
    </script>

  </head>
